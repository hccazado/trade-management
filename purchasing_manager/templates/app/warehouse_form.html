{% extends "base.html" %}
{% block content %}

<a href="{{ url_for('warehouse.index') }}" class="btn btn-sm btn-outline-secondary mb-3">
    <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle">arrow_back</span> Voltar
</a>

{% set v = warehouse if isediting else {} %}

<div class="form-card">
    <h2 class="form-title">{% if isediting %}Editar Armazém{% else %}Cadastrar Armazém{% endif %}</h2>
    <form id="form" method="post">
        <div class="mb-3">
            <label class="form-label" for="nome">Nome</label>
            <input class="form-control" id="nome" name="nome" value="{{ v.get('nome', '') }}">
        </div>
        <div class="mb-3">
            <label class="form-label" for="email">E-mail</label>
            <input class="form-control" type="email" id="email" name="email" value="{{ v.get('email', '') }}">
        </div>
        <!-- Row: Tel / CEP / CNPJ -->
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label" for="tel">Telefone</label>
                <input class="form-control" id="tel" name="tel" value="{{ v.get('tel', '') }}">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="cep">CEP</label>
                <input class="form-control" id="cep" type="number" name="cep" value="{{ v.get('cep', '') }}">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="cnpj">CNPJ/CPF</label>
                <input class="form-control" id="cnpj" name="cnpj" value="{{ v.get('cnpj', '') }}">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="ie">I.E.</label>
            <input class="form-control" id="ie" name="ie" value="{{ v.get('ie', '') }}">
        </div>
        <!-- Row: End / Num / Complemento -->
        <div class="row mb-3">
            <div class="col-md-7">
                <label class="form-label" for="end">End.</label>
                <input class="form-control" id="end" name="end" value="{{ v.get('end', '') }}">
            </div>
            <div class="col-md-2">
                <label class="form-label" for="num">Num.</label>
                <input class="form-control" id="num" name="num" value="{{ v.get('num', '') }}">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="complemento">Complemento</label>
                <input class="form-control" id="complemento" name="complemento" value="{{ v.get('complemento', '') }}">
            </div>
        </div>
        <!-- Row: Bairro / Cidade / UF -->
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label" for="bairro">Bairro</label>
                <input class="form-control" id="bairro" name="bairro" value="{{ v.get('bairro', '') }}">
            </div>
            <div class="col-md-5">
                <label class="form-label" for="cidade">Cidade</label>
                <input class="form-control" id="cidade" name="cidade" value="{{ v.get('cidade', '') }}">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="uf">UF</label>
                <select class="form-select" name="uf" id="uf">
                    <option value="" disabled {% if not v.get('uf') %}selected{% endif %}>Selecione UF</option>
                    {% for item in uf %}
                    <option value="{{ item['uf'] }}" {% if v.get('uf') == item['uf'] %}selected{% endif %}>{{ item.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="obs">OBS</label>
            <textarea class="form-control" rows="3" id="obs" name="obs">{{ v.get('obs', '') }}</textarea>
        </div>
        <button type="submit" class="btn btn-teal">{% if isediting %}Atualizar{% else %}Cadastrar{% endif %}</button>
    </form>
</div>

<script src="{{ url_for('static', filename='cep.js') }}"></script>
{% endblock %}
