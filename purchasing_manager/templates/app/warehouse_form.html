{%extends "base.html"%}
{%block content%}

<a href="{{url_for('client.index')}}">
    <img class="return" src="{{url_for('static',filename='return.png')}}">
</a>

{%if not isediting%}
<h1>Formulario Armazém </h1>
    <section class="lt_mgt">
        <form id="form" method="post">
            <ul>
                <li>
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome">
                </li>
                <li>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email">
                </li>
                <li>
                    <label for="cnpj">CNPJ/CPF</label>
                    <input id="cnpj" name="cnpj">
                </li>
                <li>
                    <label for="ie">I.E.</label>
                    <input id="ie" name="ie">
                </li>
                <li>
                    <label for="tel">Telefone</label>
                    <input id="tel" name="tel">
                </li>
                <li>
                    <label for="cep">CEP</label>
                    <input id="cep" type="number" name="cep">
                </li>
                <li>
                    <label for="endereco">End.</label>
                    <input id="endereco" name="endereco">
                </li>
                <li>
                    <label for="num">Num.</label>
                    <input id="num" name="num">
                </li>
                <li>
                    <label for="comp">Complemento</label>
                    <input id="complemento" name="complemento">
                </li>
                <li>
                    <label for="bairro">Bairro</label>
                    <input id="bairro" name="bairro" >
                </li>
                <li>
                    <label for="cidade">Cidade</label>
                    <input id="cidade" name="cidade" >
                </li>
                <li>
                    <label for="uf">UF</label>
                <select name="uf" id="uf">
                    <option value="--" disabled selected>Selecione UF</option>
                    {%for item in uf%}
                        <option value="{{item['uf']}}">{{item.name}}</option>
                    {% endfor %}
                </select>
                </li>
                <li>
                    <label for="conta">Conta P/ Pagamento</label>
                    <input id="conta" name="conta" >
                </li>
                <li>
                    <label for="obs">OBS</label>
                    <textarea id="obs" name="obs"></textarea>
                </li>
                <li>
                    <button type="submit">Cadastrar</button>
                </li>
            </ul>
        </form>
    </section>
{%else%}
<h1>Editando Armazém </h1> 
<section class="lt_mgt">
    <form id="form" method="post">
        <ul>
            <li>
                <label for="nome">Nome</label>
                <input id="nome" name="nome" value="{{warehouse.nome}}">
            </li>
            <li>
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" value="{{warehouse.email}}">
            </li>
            <li>
                <label for="cnpj">CNPJ/CPF</label>
                <input id="cnpj" name="cnpj" value="{{warehouse.cnpj}}">
            </li>
            <li>
                <label for="ie">I.E.</label>
                <input id="ie" name="ie" value="{{warehouse.ie}}">
            </li>
            <li>
                <label for="tel">Telefone</label>
                <input id="tel" name="tel" value="{{warehouse.tel}}">
            </li>
            <li>
                <label for="cep">CEP</label>
                <input id="cep" name="cep" type="number" value="{{warehouse.cep}}">
            </li>
            <li>
                <label for="endereco">End.</label>
                <input id="endereco" name="end" value="{{warehouse.end}}">
            </li>
            <li>
                <label for="num">Num</label>
                <input id="num" name="num" value="{{warehouse.num}}">
            </li>
            <li>
                <label for="complemento">Complemento</label>
                <input id="complemento" name="complemento" value="{{warehouse.complemento}}">
            </li>
            <li>
                <label for="bairro">Bairro</label>
                <input id="bairro" name="bairro" value="{{warehouse.bairro}}">
            </li>
            <li>
                <label for="cidade">Cidade</label>
                <input id="cidade" name="cidade" value="{{warehouse.cidade}}">
            </li>
            <li>
                <label for="uf">UF</label>
                <select name="uf" id="uf">
                    <option value="--" disabled selected>Selecione UF</option>
                    {%for item in uf%}
                        {% if warehouse['uf'] == item['uf'] %}
                            <option value="{{item['uf']}}" selected>{{item.name}}</option>
                        {% else %}
                            <option value="{{item['uf']}}">{{item.name}}</option>
                        {% endif %}
                    {% endfor %}
                </select>
            </li>
            <li>
                <label for="obs">OBS</label>
                <textarea id="obs" name="obs">{{warehouse.obs}}</textarea>
            </li>
            <li>
                <button type="submit">Atualizar</button>
            </li>
        </ul>
    </form>
</section>
{%endif%}
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="{{url_for('static', filename='cep.js')}}"></script>
{%endblock%}
