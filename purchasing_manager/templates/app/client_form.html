{%extends "base.html"%}

<h1>{%block title%} {%endblock%}</h1>

{%block content%}
{%if not isediting%}
    <section class="lt_mgt">
        <form id="form" method="post">
            <ul>
                <li>
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome">
                </li>
                <li>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email">
                </li>
                <li>
                    <label for="doc">CNPJ/CPF</label>
                    <input id="doc" name="doc">
                </li>
                <li>
                    <label for="tel">Telefone</label>
                    <input id="tel" name="tel">
                </li>
                <li>
                    <label for="cep">CEP</label>
                    <input id="cep" name="cep">
                </li>
                <li>
                    <label for="end">End.</label>
                    <input id="end" name="end">
                </li>
                <li>
                    <label for="num">num</label>
                    <input id="num" name="num">
                </li>
                <li>
                    <label for="bairro">Bairro</label>
                    <input id="bairro" name="bairro" >

                <li>
                    <label for="cidade">cidade</label>

                </li>
                <li>
                    <label for="uf">UF</label>
                    <input id="uf" name="uf" >
                </li>
                <li>
                    <label for="obs">OBS</label>
                    <textarea id="obs" name="obs"></textarea>
                </li>
                <li>
                    <button type="submit">Cadastrar</button>
                </li>
            </ul>
        </form>
    </section>
{%else%} 
<section class="lt_mgt">
    <form id="form" method="post">
        <ul>
            <li>
                <label for="nome">Nome</label>
                <input id="nome" name="nome" value="{{client[nome]}}">
            </li>
            <li>
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" value="{{client[email]}}">
            </li>
            <li>
                <label for="doc">CNPJ/CPF</label>
                <input id="doc" name="doc" value="{{client[doc]}}">
            </li>
            <li>
                <label for="tel">Telefone</label>
                <input id="tel" name="tel" value="{{client[tel]}}">
            </li>
            <li>
                <label for="cep">CEP</label>
                <input id="cep" name="cep" value="{{client[cep]}}">
            </li>
            <li>
                <label for="end">End.</label>
                <input id="end" name="end" value="{{client[end]}}">
            </li>
            <li>
                <label for="num">num</label>
                <input id="num" name="num" value="{{client[num]}}">
            </li>
            <li>
                <label for="bairro">Bairro</label>
                <input id="bairro" name="bairro" value="{{client[bairro]}}">
            </li>
            <li>
                <label for="cidade">cidade</label>
                <input id="cidade" name="cidade" value="{{client[cidade]}}">
            </li>
            <li>
                <label for="uf">UF</label>
                <input id="uf" name="uf">
            </li>
            <li>
                <label for="obs">OBS</label>
                <textarea id="obs" name="obs">{{client[obs]}}</textarea>
            </li>
            <li>
                <button type="submit">Atualizar</button>
            </li>
        </ul>
    </form>
</section>
{%endif%}
{%endblock%}
