{% extends "base.html" %}
{% block content %}

<a href="{{ url_for('sample.index') }}">
    <img class="return" src="{{ url_for('static', filename='return.png') }}">
</a>

{% if not isediting %}
<h2 class="center">Cadastrar Amostra</h2>
<section class="lt_mgt">
    <form id="form" method="post">
        <ul>
            <li>
                <label for="client">Cliente</label>
                <select name="client" id="client">
                    <option value="" selected>Sem Cliente / Nenhum</option>
                    {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.nome }}</option>
                    {% endfor %}
                </select>
            </li>
            <li>
                <label for="type">Tipo</label>
                <select name="type" id="type">
                    <option value="" selected>— Selecionar —</option>
                    <option value="fine">Fine</option>
                    <option value="verygood">Very Good</option>
                    <option value="good">Good</option>
                    <option value="bica">Bica</option>
                    <option value="barrento">Barrento</option>
                    <option value="escolha">Escolha</option>
                    <option value="chuvado">Chuvado</option>
                    <option value="fd10">FD10</option>
                </select>
            </li>
            <li>
                <label for="data">Data</label>
                <input id="data" name="data" value="{{ today }}">
            </li>
            <li>
                <label for="num_amostra">Número da Amostra</label>
                <input id="num_amostra" name="num_amostra"
                    placeholder="Deixar em branco para gerar automaticamente (ex: 001/26)">
            </li>

            <li>
                <label for="17/8">Peneira 17/8</label>
                <input id="17/8" name="17/8" type="number" step="0.1" min="0" placeholder="ex: 30.5">
            </li>
            <li>
                <label for="13">Peneira 13</label>
                <input id="13" name="13" type="number" step="0.1" min="0" placeholder="ex: 25.0">
            </li>
            <li>
                <label for="10">Peneira 10</label>
                <input id="10" name="10" type="number" step="0.1" min="0" placeholder="ex: 15.0">
            </li>
            <li>
                <label for="Mk">Moka (Mk)</label>
                <input id="Mk" name="Mk" type="number" step="0.1" min="0" placeholder="ex: 10.0">
            </li>
            <li>
                <label for="FD">Fundo (FD)</label>
                <input id="FD" name="FD" type="number" step="0.1" min="0" placeholder="ex: 20.0">
            </li>
            <li>
                <label for="Cata">Catado (Cata)</label>
                <input id="Cata" name="Cata" type="number" step="0.1" min="0" placeholder="ex: 12.0">
            </li>
            <li>
                <label for="PVA">Defeitos (PVA)</label>
                <input id="PVA" name="PVA" type="number" step="0.1" min="0" placeholder="ex: 10.0">
            </li>
            <li>
                <label for="Broca">Broca</label>
                <input id="Broca" name="Broca" type="number" step="0.1" min="0" placeholder="ex: 2.0">
            </li>

            <li>
                <fieldset>
                    <legend>Bebida</legend>
                    <label for="Duro">Duro</label>
                    <input id="Duro" name="Duro" type="number" min="0" placeholder="num. copos">
                    <label for="Riado">Riado</label>
                    <input id="Riado" name="Riado" type="number" min="0" placeholder="num. copos">
                    <label for="Rio">Rio</label>
                    <input id="Rio" name="Rio" type="number" min="0" placeholder="num. copos">
                    <label for="Fermentado">Fermentado</label>
                    <input id="Fermentado" name="Fermentado" type="number" min="0" placeholder="num. copos">
                    <label for="Sujo">Sujo</label>
                    <input id="Sujo" name="Sujo" type="number" min="0" placeholder="num. copos">
                </fieldset>
            </li>

            <li>
                <label for="quantidade">Quantidade (sacas)</label>
                <input id="quantidade" name="quantidade" type="number" min="0" placeholder="e.g. 300">
            </li>

            <li>
                <label for="obs">Observações (OBS)</label>
                <textarea id="obs" name="obs" placeholder="Conforme amostra..."></textarea>
            </li>

            <li>
                <label for="comunicar_compradores">
                    <input type="checkbox" id="comunicar_compradores" name="comunicar_compradores">
                    Comunicar compradores
                </label>
            </li>
            <li>
                <button type="submit">Cadastrar</button>
            </li>
        </ul>
    </form>
</section>
{% else %}
<h1>Editar Amostra</h1>
<section class="lt_mgt">
    <form id="form" method="post">
        <ul>
            <li>
                <label for="client">Cliente</label>
                <select name="client" id="client">
                    {% if not sample.client or sample.client == "" %}
                    <option value="" selected>Sem Cliente / Nenhum</option>
                    {% else %}
                    <option value="">Sem Cliente / Nenhum</option>
                    {% endif %}
                    {% for client in clients %}
                    {% if sample.client == client.id %}
                    <option value="{{ client.id }}" selected>{{ client.nome }}</option>
                    {% else %}
                    <option value="{{ client.id }}">{{ client.nome }}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </li>
            <li>
                <label for="type">Tipo</label>
                <select name="type" id="type">
                    <option value="" {% if not sample.get('type') %}selected{% endif %}>— Selecionar —</option>
                    {% for opt in ['fine', 'verygood', 'good', 'bica', 'barrento', 'escolha', 'chuvado', 'fd10'] %}
                    <option value="{{ opt }}" {% if sample.get('type')==opt %}selected{% endif %}>
                        {{ opt|capitalize }}
                    </option>
                    {% endfor %}
                </select>
            </li>
            <li>
                <label for="data">Data</label>
                <input id="data" name="data" value="{{ sample.data }}">
            </li>
            <li>
                <label for="num_amostra">Número da Amostra</label>
                <input id="num_amostra" name="num_amostra" value="{{ sample.num_amostra }}">
            </li>

            <li>
                <label for="17/8">Peneira 17/8</label>
                <input id="17/8" name="17/8" type="number" step="0.1" min="0" value="{{ sample['17/8'] }}">
            </li>
            <li>
                <label for="13">Peneira 13</label>
                <input id="13" name="13" type="number" step="0.1" min="0" value="{{ sample['13'] }}">
            </li>
            <li>
                <label for="10">Peneira 10</label>
                <input id="10" name="10" type="number" step="0.1" min="0" value="{{ sample['10'] }}">
            </li>
            <li>
                <label for="Mk">Moka (Mk)</label>
                <input id="Mk" name="Mk" type="number" step="0.1" min="0" value="{{ sample.Mk }}">
            </li>
            <li>
                <label for="FD">Fundo (FD)</label>
                <input id="FD" name="FD" type="number" step="0.1" min="0" value="{{ sample.FD }}">
            </li>
            <li>
                <label for="Cata">Catado (Cata)</label>
                <input id="Cata" name="Cata" type="number" step="0.1" min="0" value="{{ sample.Cata }}">
            </li>
            <li>
                <label for="PVA">Defeitos (PVA)</label>
                <input id="PVA" name="PVA" type="number" step="0.1" min="0" value="{{ sample.PVA }}">
            </li>
            <li>
                <label for="Broca">Broca</label>
                <input id="Broca" name="Broca" type="number" step="0.1" min="0" value="{{ sample.Broca }}">
            </li>

            <li>
                <fieldset>
                    <legend>Bebida</legend>
                    <label for="Duro">Duro</label>
                    <input id="Duro" name="Duro" type="number" min="0" placeholder="num. copos"
                        value="{{ sample.Duro }}">
                    <label for="Riado">Riado</label>
                    <input id="Riado" name="Riado" type="number" min="0" placeholder="num. copos"
                        value="{{ sample.Riado }}">
                    <label for="Rio">Rio</label>
                    <input id="Rio" name="Rio" type="number" min="0" placeholder="num. copos" value="{{ sample.Rio }}">
                    <label for="Fermentado">Fermentado</label>
                    <input id="Fermentado" name="Fermentado" type="number" min="0" placeholder="num. copos"
                        value="{{ sample.Fermentado }}">
                    <label for="Sujo">Sujo</label>
                    <input id="Sujo" name="Sujo" type="number" min="0" placeholder="num. copos"
                        value="{{ sample.Sujo }}">
                </fieldset>
            </li>

            <li>
                <label for="quantidade">Quantidade (sacas)</label>
                <input id="quantidade" name="quantidade" type="number" min="0" placeholder="e.g. 300"
                    value="{{ sample.get('quantidade', '') }}">
            </li>

            <li>
                <label for="obs">Observações (OBS)</label>
                <textarea id="obs" name="obs">{{ sample.obs }}</textarea>
            </li>

            <li style="display:flex;gap:10px;align-items:center">
                <button type="submit">Atualizar</button>
                <button type="button" id="btn-copy-form">📋 Copiar amostra</button>
            </li>
        </ul>
    </form>
    <form method="post" action="{{ url_for('sample.notify', id=sample.id) }}" style="margin:0 auto 16px;width:90%;text-align:right">
        <button type="submit">Comunicar compradores</button>
    </form>
</section>
<script src="{{ url_for('static', filename='copy_sample.js') }}"></script>
{% endif %}
{% endblock %}
