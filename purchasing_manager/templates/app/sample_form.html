{% extends "base.html" %}
{% block content %}

<a href="{{ url_for('sample.index') }}" class="btn btn-sm btn-outline-secondary mb-3">
    <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle">arrow_back</span> Voltar
</a>

<div class="form-card">
    <h2 class="form-title">{% if isediting %}Editar Amostra{% else %}Cadastrar Amostra{% endif %}</h2>
    <form id="form" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold" for="client">Cliente</label>
            <select class="form-select" name="client" id="client">
                {% if isediting %}
                    {% if not sample.client or sample.client == "" %}
                    <option value="" selected>Sem Cliente / Nenhum</option>
                    {% else %}
                    <option value="">Sem Cliente / Nenhum</option>
                    {% endif %}
                    {% for client in clients %}
                    <option value="{{ client.id }}" {% if sample.client == client.id %}selected{% endif %}>{{ client.nome }}</option>
                    {% endfor %}
                {% else %}
                <option value="" selected>Sem Cliente / Nenhum</option>
                {% for client in clients %}
                <option value="{{ client.id }}">{{ client.nome }}</option>
                {% endfor %}
                {% endif %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold" for="type">Tipo</label>
            <select class="form-select" name="type" id="type">
                <option value="" {% if isediting and not sample.get('type') %}selected{% elif not isediting %}selected{% endif %}>— Selecionar —</option>
                {% for opt in ['fine', 'verygood', 'good', 'bica', 'barrento', 'escolha', 'chuvado', 'fd10'] %}
                <option value="{{ opt }}" {% if isediting and sample.get('type') == opt %}selected{% endif %}>
                    {{ opt|capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold" for="data">Data</label>
            <input class="form-control" id="data" name="data" value="{{ sample.data if isediting else today }}">
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold" for="num_amostra">Número da Amostra</label>
            <input class="form-control" id="num_amostra" name="num_amostra"
                placeholder="Deixar em branco para gerar automaticamente (ex: 001/26)"
                value="{{ sample.num_amostra if isediting else '' }}">
        </div>

        <div class="card mb-3">
            <div class="card-header fw-semibold">Peneiras (%)</div>
            <div class="card-body">
                <div class="d-flex flex-wrap gap-3">
                    <div>
                        <label class="form-label small">17/8</label>
                        <input class="form-control form-control-sm" style="width:80px" id="17/8" name="17/8" type="number" step="0.1" min="0"
                            value="{{ sample.get('17/8', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">13</label>
                        <input class="form-control form-control-sm" style="width:80px" id="13" name="13" type="number" step="0.1" min="0"
                            value="{{ sample.get('13', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">10</label>
                        <input class="form-control form-control-sm" style="width:80px" id="10" name="10" type="number" step="0.1" min="0"
                            value="{{ sample.get('10', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">Mk</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Mk" name="Mk" type="number" step="0.1" min="0"
                            value="{{ sample.get('Mk', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">FD</label>
                        <input class="form-control form-control-sm" style="width:80px" id="FD" name="FD" type="number" step="0.1" min="0"
                            value="{{ sample.get('FD', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">Cata</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Cata" name="Cata" type="number" step="0.1" min="0"
                            value="{{ sample.get('Cata', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">PVA</label>
                        <input class="form-control form-control-sm" style="width:80px" id="PVA" name="PVA" type="number" step="0.1" min="0"
                            value="{{ sample.get('PVA', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">Broca</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Broca" name="Broca" type="number" step="0.1" min="0"
                            value="{{ sample.get('Broca', '') if isediting else '' }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header fw-semibold">Bebida</div>
            <div class="card-body">
                <div class="d-flex flex-wrap gap-3">
                    <div>
                        <label class="form-label small">Duro</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Duro" name="Duro" type="number" min="0" placeholder="copos"
                            value="{{ sample.get('Duro', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">Riado</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Riado" name="Riado" type="number" min="0" placeholder="copos"
                            value="{{ sample.get('Riado', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">Rio</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Rio" name="Rio" type="number" min="0" placeholder="copos"
                            value="{{ sample.get('Rio', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">Fermentado</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Fermentado" name="Fermentado" type="number" min="0" placeholder="copos"
                            value="{{ sample.get('Fermentado', '') if isediting else '' }}">
                    </div>
                    <div>
                        <label class="form-label small">Sujo</label>
                        <input class="form-control form-control-sm" style="width:80px" id="Sujo" name="Sujo" type="number" min="0" placeholder="copos"
                            value="{{ sample.get('Sujo', '') if isediting else '' }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold" for="quantidade">Quantidade (sacas)</label>
            <input class="form-control" id="quantidade" name="quantidade" type="number" min="0" placeholder="e.g. 300"
                value="{{ sample.get('quantidade', '') if isediting else '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold" for="obs">Observações (OBS)</label>
            <textarea class="form-control" rows="3" id="obs" name="obs" placeholder="Conforme amostra...">{{ sample.obs if isediting else '' }}</textarea>
        </div>

        {% if isediting %}
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-teal">Atualizar</button>
                <button type="button" id="btn-copy-form" class="btn btn-outline-secondary">Copiar amostra</button>
            </div>
            <button type="submit" formaction="{{ url_for('sample.notify', id=sample.id) }}" class="btn btn-teal">Comunicar compradores</button>
        </div>
        {% else %}
        <div class="mb-3">
            <button type="submit" class="btn btn-teal">Cadastrar</button>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="comunicar_compradores" name="comunicar_compradores">
            <label class="form-check-label" for="comunicar_compradores">Comunicar compradores</label>
        </div>
        {% endif %}
    </form>
</div>

{% if isediting %}
<script src="{{ url_for('static', filename='copy_sample.js') }}"></script>
{% endif %}
{% endblock %}
