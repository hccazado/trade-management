{% extends "base.html" %}
{% block content %}
<h2 class="center">Compradores</h2>
<section class="lt_mgt">
    <div class="mgt_row">
        <input name="search" id="input_search" placeholder="Buscar por nome">
        <a class="button" href="{{ url_for('buyer.new') }}">Novo Comprador</a>
    </div>
    <div class="mgt_container">
        <table>
            <thead>
                <td>Nome</td>
                <td>WhatsApp</td>
                <td class="col-icon">Ativo</td>
                <td>Editar</td>
            </thead>
            <tbody id="mgt_body">
                {% for buyer in buyers %}
                <tr>
                    <td>{{ buyer.nome }}</td>
                    <td>{{ buyer.whatsapp }}</td>
                    <td class="col-icon">{{ '✓' if buyer.get('ativo') else '—' }}</td>
                    <td>
                        <a href="{{ url_for('buyer.edit', id=buyer.id) }}">
                            <img class="edit" src="{{ url_for('static', filename='edit.png') }}">
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="{{ url_for('static', filename='find_buyers.js') }}"></script>
{% endblock %}
